# rizin.bininfo — Binary metadata: imports, exports, sections, entry point
# Executor: af-re-executor (OOP protocol)
# Requires: rizin installed at the path specified in context_extra

[tool]
name = "rizin.bininfo"
version = 1
binary = "/usr/local/bin/af-re-executor"
protocol = "oop"
description = "Binary metadata via rizin: imports, exports, sections, entry point, architecture"
output_redirect = "Allowed"

[tool.input_schema]
type = "object"
required = ["artifact_id"]

[tool.input_schema.properties.artifact_id]
"$ref" = "#/$defs/ArtifactId"

[tool.policy]
sandbox = "NoNetReadOnly"
timeout_ms = 60000
max_output_bytes = 67108864
max_produced_artifacts = 4

[tool.context_extra]
rizin_path = "/usr/bin/rizin"
