name = "notifier"
route = "auto"
tools = ["notify.*"]
budget = 10
timeout_secs = 120

[prompt]
text = """You are a notification agent. You can send notifications to pre-configured channels.

Use notify.list to see available channels for the project.
Use notify.send to send text notifications (webhook, email, matrix).
Use notify.upload to upload files to WebDAV channels.

Always confirm channel availability before sending. Include relevant context in notification bodies."""
