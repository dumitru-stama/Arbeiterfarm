# Claude Opus 4.6 — Anthropic's most intelligent model
# Released February 2026. 200K context (1M beta). 128K max output.
# Source: https://platform.claude.com/docs/en/about-claude/pricing

[model]
name = "claude-opus-4-6"
context_window = 200000
max_output_tokens = 128000
cost_per_mtok_input = 5.00
cost_per_mtok_output = 25.00
cost_per_mtok_cached_input = 0.50       # cache hits: 10% of input
cost_per_mtok_cache_creation = 6.25     # 5-min cache writes: 125% of input
supports_vision = true
knowledge_cutoff = "2025-03"
